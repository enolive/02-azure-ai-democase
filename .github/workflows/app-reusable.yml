###############################################################################
# AI Demo Case - Reusable Function App Deploy Workflow
# Deploys the Python Function App to Azure
###############################################################################

name: AI Demo Case - App Deploy (Reusable)

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Function app working directory'
        required: false
        type: string
        default: 'function-app'

jobs:
  deploy:
    name: Deploy Function App
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        shell: bash
        run: |
          pushd './${{ inputs.working_directory }}'
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd
        working-directory: ${{ github.workspace }}

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.UNIQUE_SUFFIX }}-func-${{ vars.PROJECT_NAME || 'frauddetect' }}
          package: ${{ inputs.working_directory }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
          respect-funcignore: true

      - name: Print Function App URL
        run: |
          FUNCTION_APP_NAME="${{ vars.UNIQUE_SUFFIX }}-func-${{ vars.PROJECT_NAME || 'frauddetect' }}"
          echo "Function App URL: https://${FUNCTION_APP_NAME}.azurewebsites.net"
          echo "## Function App Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${FUNCTION_APP_NAME}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY

      - name: Azure Logout
        if: always()
        run: az logout
        continue-on-error: true
