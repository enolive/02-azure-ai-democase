###############################################################################
# AI Demo Case - Terraform Destroy
# Destroys all Terraform-managed resources
# Manual trigger only with safety confirmation
###############################################################################

name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY to confirm resource deletion'
        required: true
        type: string
      terraform_version:
        description: 'Terraform version'
        required: false
        type: string
        default: '1.14.4'

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check Confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "::error::Confirmation failed. You entered '${{ inputs.confirm }}' but must type 'DESTROY'"
            exit 1
          fi
          echo "Confirmation validated. Proceeding with destroy."

  destroy:
    name: Destroy Resources
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_IN_AUTOMATION: true
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: true

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="backend.tfvars" \
            -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
            -input=false

      - name: Terraform Plan Destroy
        id: plan
        run: |
          echo "::warning::Planning destruction of all resources"
          terraform plan \
            -destroy \
            -var="unique_variable_name_suffix=${{ vars.UNIQUE_SUFFIX }}" \
            -input=false \
            -no-color \
            -out=tfplan-destroy

      - name: Terraform Destroy
        id: destroy
        run: |
          echo "::warning::Destroying all resources"
          terraform apply \
            -input=false \
            -auto-approve \
            tfplan-destroy

      - name: Destroy Summary
        if: always()
        run: |
          echo "## Destroy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.destroy.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY

      - name: Azure Logout
        if: always()
        run: az logout
        continue-on-error: true
